<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>ELAYON CRS</title>
  <link rel="stylesheet" href="styles.css">
</head>

<body>

  <header>
    <h1>ELAYON CRS</h1>
    <p>Interface de análise temporal</p>
  </header>

  <main>

    <section class="card">
      <h2>Entrada</h2>

      <input id="context" placeholder="Contexto..." />

      <textarea id="transcript" placeholder="Transcrição ou observação"></textarea>

      <button onclick="analyzeSession()">Analisar</button>

      <p id="status">Inicializando...</p>
    </section>

    <section class="card">
      <h2>Métricas</h2>
      <p id="metrics">—</p>
    </section>

    <section class="card">
      <h2>JSON</h2>
      <textarea id="json"></textarea>
    </section>

    <section class="card">
      <h2>IA</h2>

      <button onclick="generatePrompt()">Gerar Prompt</button>

      <textarea id="prompt"></textarea>
    </section>

  </main>

  <script src="config.js"></script>
  <script src="app.js"></script>

</body>
</html>
